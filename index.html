<!DOCTYPE html>
<html lang="es">

<head>

    <!-- CONFIGURACION BASICA -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TITULO -->
    <title>Cohen-Sutherland</title>

    <style>

        /* =========================
           ESTILOS GENERALES
        ========================== */

        body{
            background:#111;
            color:white;
            font-family:Arial;
            margin:0;
        }

        /* TITULO PRINCIPAL */
        h1{
            text-align:center;
            padding:15px;
        }

        /* CONTENEDOR PRINCIPAL */
        .container{
            display:flex;
        }

        /* AREA DEL CANVAS */
        .canvas-area{
            padding:20px;
        }

        /* PANEL LATERAL */
        .panel{
            width:250px;
            background:#1b1b1b;
            padding:15px;
        }

        /* CANVAS */
        canvas{
            background:black;
            border:1px solid white;
        }

        /* INPUTS */
        input{
            width:80px;
            margin-bottom:10px;
        }

        /* BOTONES */
        button{
            padding:8px;
            cursor:pointer;
            margin-top:5px;
        }

        /* INFORMACION */
        .info{
            margin-top:15px;
        }

    </style>

</head>
